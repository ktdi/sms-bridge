<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMS Bridge</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  /* (All styles unchanged) */
</style>
</head>
<body>
  <!-- (HTML structure unchanged) -->

<script>
  /* (All script code unchanged, including showQr() which loads window.location.origin + '/qr?token=...' ) */

  function showQr() {
    const token = document.getElementById('tokenInput').value.trim();
    if (!token) { showConnectError('Enter a device token first'); return; }

    // Page is served by the server, so just use the current page origin
    const qrSrc = window.location.origin + '/qr?token=' + encodeURIComponent(token);

    const container = document.getElementById('qrcode');
    container.innerHTML = '<p style="color:#64748b;font-size:13px">Loading QR code...</p>'; // Minor text update
    document.getElementById('qrModal').classList.add('show');

    const img = new Image();
    img.style.width = "100%";
    img.style.height = "auto";
    img.style.display = 'block';
    img.onload = function() { container.innerHTML = ''; container.appendChild(img); };
    img.onerror = function() {
      container.innerHTML = '<p style="color:#ef4444;font-size:13px;padding:10px">Failed to load QR code.<br>Check if the server is running and supports /qr.</p>'; // Improved error
    };
    img.src = qrSrc;
  }

  function closeQr() {
    document.getElementById('qrModal').classList.remove('show');
  }
</script>

<!-- QR Code Modal (unchanged) -->
<div class="qr-modal" id="qrModal" onclick="if(event.target===this)closeQr()">
  <div class="qr-box">
    <h3>Scan to Connect Android</h3>
    <p>Open SMS Bridge on your phone<br>and tap "Scan QR Code"</p>
    <div id="qrcode" style="min-height:256px;display:flex;align-items:center;justify-content:center"></div>
    <button class="qr-close" onclick="closeQr()">Close</button>
  </div>
</div>
</body>
</html>
